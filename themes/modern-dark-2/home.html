<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .SiteTitle }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #060d1a;
        --surface: #0b1525;
        --surface-2: #101e30;
        --border: #172540;
        --border-soft: rgba(96, 165, 250, 0.07);
        --text: #dde8f7;
        --text-dim: #6b88ad;
        --text-muted: #2e4460;
        --accent: #60a5fa;
        --accent-2: #93c5fd;
        --accent-dim: rgba(96, 165, 250, 0.1);
        --serif: "Instrument Serif", Georgia, serif;
        --sans: "Syne", system-ui, sans-serif;
        --mono: "DM Mono", ui-monospace, monospace;
        --radius: 4px;
        --max-w: 740px;
        --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        padding: 4rem 2rem 6rem;
        background-color: var(--bg);
        background-image:
          radial-gradient(
            ellipse 80% 50% at 50% -20%,
            rgba(96, 165, 250, 0.07) 0%,
            transparent 60%
          ),
          url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2360a5fa' fill-opacity='0.018'%3E%3Ccircle cx='1' cy='1' r='1'/%3E%3C/g%3E%3C/svg%3E");
        color: var(--text);
        font-family: var(--serif);
        line-height: 1.8;
        font-size: 19px;
        -webkit-font-smoothing: antialiased;
      }

      body > * {
        max-width: var(--max-w);
        margin-left: auto;
        margin-right: auto;
      }

      a {
        color: var(--accent-2);
        text-decoration: none;
        border-bottom: 1px solid var(--border);
      }

      a:hover {
        color: #bfdbfe;
        border-bottom-color: var(--accent);
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.2rem 0 3rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 3.5rem;
      }

      nav .logo {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 1.1rem;
        letter-spacing: -0.02em;
        color: var(--text);
        border: none;
      }

      nav .logo span {
        color: var(--accent);
      }

      nav ul {
        display: flex;
        gap: 2rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      nav ul li::before {
        display: none;
      }

      nav a {
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
        border: none;
      }

      nav a:hover {
        color: var(--accent);
      }

      .hero {
        padding: 3rem 0 4rem;
      }

      .hero h1 {
        font-family: var(--sans);
        font-size: clamp(2.5rem, 6vw, 3.5rem);
        font-weight: 800;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #e8f0fc 55%, var(--accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .author-block {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        margin-bottom: 2rem;
      }

      .author-name {
        font-family: var(--sans);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text);
      }

      .author-meta {
        font-family: var(--mono);
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .author-bio {
        font-size: 1rem;
        color: #b8cce4;
        line-height: 1.7;
        max-width: 50ch;
      }

      .section-title {
        font-family: var(--mono);
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-muted);
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 2rem;
      }

      .post-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .post-item {
        display: block;
        text-decoration: none;
        padding: 1.2rem 0;
        border-bottom: 1px solid var(--border);
        transition: background 130ms ease;
      }

      .post-item:last-child {
        border-bottom: none;
      }

      .post-item:hover {
        background: var(--surface);
      }

      .post-item:hover .post-title {
        color: var(--accent);
      }

      .post-title {
        font-family: var(--sans);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text);
        line-height: 1.4;
        margin-bottom: 0.35rem;
        transition: color 130ms ease;
        border: none;
      }

      .post-meta {
        font-family: var(--mono);
        font-size: 0.7rem;
        letter-spacing: 0.04em;
        color: var(--text-dim);
      }

      .post-tags {
        display: flex;
        gap: 0.4rem;
        margin-top: 0.5rem;
      }

      .tag {
        font-family: var(--mono);
        font-size: 0.6rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.15rem 0.5rem;
        border: 1px solid var(--border);
        border-radius: 2px;
        color: var(--text-dim);
      }

      footer {
        margin-top: 5rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      @media (max-width: 700px) {
        body {
          padding: 2rem 1.2rem 4rem;
          font-size: 17px;
        }
        nav {
          flex-wrap: wrap;
          gap: 1rem;
        }
        footer {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="logo">Kite<span>.</span></a>
      <ul>
        <li><a href="/">Home</a></li>
      </ul>
    </nav>

    <main>
      <section class="hero">
        <h1>{{ .SiteTitle }}</h1>
        <div class="author-block">
          <span class="author-name">{{ .AuthorName }}</span>
          <span class="author-meta">{{ .AuthorRole }}</span>
        </div>
        <p class="author-bio">{{ .AuthorBio }}</p>
      </section>

      <section class="posts">
        <h2 class="section-title">Latest Posts</h2>
        <ul class="post-list">
          {{ range .Posts }}
          <li>
            <a href="/{{ .Slug }}/" class="post-item">
              <span class="post-title">{{ .Title }}</span>
              <div class="post-meta">
                <time>{{ .Date }}</time>
              </div>
              {{ if .Tags }}
              <div class="post-tags">
                {{ range .Tags }}
                <span class="tag">{{ . }}</span>
                {{ end }}
              </div>
              {{ end }}
            </a>
          </li>
          {{ end }}
        </ul>
      </section>
    </main>

    <footer>
      <span>&copy; {{ .Year }} {{ .AuthorName }}</span>
    </footer>
  </body>
</html>
