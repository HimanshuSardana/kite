<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ .Title }}" />
    <title>{{ .Title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-okaidia.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>
    <style>
      :root {
        --bg: #060d1a;
        --surface: #0b1525;
        --surface-2: #101e30;
        --border: #172540;
        --border-soft: rgba(96, 165, 250, 0.07);
        --text: #dde8f7;
        --text-dim: #6b88ad;
        --text-muted: #2e4460;
        --accent: #60a5fa;
        --accent-2: #93c5fd;
        --accent-dim: rgba(96, 165, 250, 0.1);
        --accent-glow: rgba(96, 165, 250, 0.12);
        --serif: "Instrument Serif", Georgia, serif;
        --sans: "Syne", system-ui, sans-serif;
        --mono: "DM Mono", ui-monospace, monospace;
        --radius: 4px;
        --max-w: 740px;
        --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        padding: 4rem 2rem 6rem;
        background-color: var(--bg);
        background-image:
          radial-gradient(
            ellipse 80% 50% at 50% -20%,
            rgba(96, 165, 250, 0.07) 0%,
            transparent 60%
          ),
          url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2360a5fa' fill-opacity='0.018'%3E%3Ccircle cx='1' cy='1' r='1'/%3E%3C/g%3E%3C/svg%3E");
        color: var(--text);
        font-family: var(--serif);
        line-height: 1.8;
        font-size: 19px;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body > * {
        max-width: var(--max-w);
        margin-left: auto;
        margin-right: auto;
      }

      h1, h2, h3, h4 {
        font-family: var(--sans);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.02em;
        scroll-margin-top: 1.5rem;
        color: #e8f0fc;
      }

      h1 {
        font-size: clamp(2.2rem, 5vw, 3rem);
        font-weight: 800;
        margin-bottom: 1.2rem;
        background: linear-gradient(135deg, #e8f0fc 55%, var(--accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      h2 {
        font-size: 1.5rem;
        margin-top: 3.5rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border);
        color: var(--text);
      }

      h3 {
        font-size: 1.15rem;
        font-weight: 600;
        margin-top: 2.2rem;
        color: var(--text);
      }

      p {
        margin: 1.4rem 0;
        color: #b8cce4;
        font-size: 1.2rem;
      }

      a {
        color: var(--accent-2);
        text-decoration: none;
        border-bottom: 1px solid var(--border);
      }

      a:hover {
        color: #bfdbfe;
        border-bottom-color: var(--accent);
      }

      ul, ol {
        margin: 1.4rem 0;
        padding-left: 0;
        list-style: none;
      }

      ul li, ol li {
        position: relative;
        padding-left: 1.5rem;
        margin: 0.55rem 0;
        color: #b8cce4;
      }

      ul li::before {
        content: "–";
        position: absolute;
        left: 0;
        color: var(--accent);
        font-family: var(--mono);
      }

      code {
        font-family: var(--mono);
        font-size: 0.83rem;
        background: var(--surface-2);
        color: var(--accent);
        padding: 0.18rem 0.4rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        word-break: break-word;
      }

      pre {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 2px solid var(--accent);
        padding: 1.4rem 1.6rem;
        overflow-x: auto;
        border-radius: var(--radius);
        margin: 2rem 0;
      }

      pre code {
        background: none;
        border: none;
        padding: 0;
        color: #c4d8ee;
        font-size: 0.87rem;
        line-height: 1.65;
      }

      blockquote {
        margin: 2.5rem 0;
        padding: 1.5rem 1.8rem;
        background: var(--surface);
        border-left: 2px solid var(--accent);
        border-radius: 0 var(--radius) var(--radius) 0;
      }

      blockquote p {
        margin: 0;
        font-style: italic;
        font-size: 1.1rem;
        color: #ccddf0;
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        margin: 2rem auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 2rem 0;
        font-size: 0.9rem;
        font-family: var(--mono);
        background: var(--surface);
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border);
      }

      thead {
        background: var(--surface-2);
      }

      th {
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent-2);
        border-bottom: 1px solid var(--border);
        font-weight: 500;
      }

      td {
        padding: 0.65rem 1rem;
        border-bottom: 1px solid var(--border-soft);
        color: #a8bdd8;
      }

      hr {
        border: none;
        margin: 3.5rem auto;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--border) 20%,
          var(--border) 80%,
          transparent
        );
      }

      main { display: flex; flex-direction: column; align-items: center; }

      .toc-wrap { margin: 2.5rem 0; }

      .toc {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 2px solid var(--accent);
        border-radius: 3px;
        padding: 1rem 1.2rem;
      }

      .toc-title {
        font-size: 0.8rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0 0 0.8rem;
        display: block;
        cursor: pointer;
      }

      .toc ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .toc li {
        padding: 0.2rem 0;
        margin: 0;
      }

      .toc li::before {
        display: none;
      }

      .toc a {
        font-size: 0.85rem;
        color: var(--text-dim);
        text-decoration: none;
        border: none;
        display: block;
        padding: 0.2rem 0;
      }

      .toc a:hover {
        color: var(--accent);
        border: none;
      }

      .toc a.active {
        color: var(--accent);
        font-weight: 500;
      }

      .toc-toggle {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        font-family: var(--mono);
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 0.8rem;
        width: 100%;
        text-align: left;
      }

      .toc-toggle svg { transition: transform 140ms ease; }
      .toc-toggle[aria-expanded="false"] svg { transform: rotate(-90deg); }

      .toc-body {
        overflow: hidden;
        transition: max-height 240ms ease, opacity 200ms ease;
        max-height: 500px;
        opacity: 1;
      }

      .toc-body.collapsed { max-height: 0; opacity: 0; }

      @media (max-width: 699px) {
        .toc-title { display: none; }
      }

      @media (min-width: 700px) and (max-width: 1099px) {
        .toc { display: block; background: transparent; border: none; border-left: 2px solid var(--accent); padding: 0 0 0 1rem; }
        .toc-title { display: block; }
        .toc-body { max-height: none !important; opacity: 1 !important; }
      }

      @media (min-width: 1100px) {
        main { flex-direction: row; align-items: flex-start; max-width: 1100px; }
        .toc-wrap { position: sticky; top: 6rem; width: 200px; flex-shrink: 0; margin-right: 3rem; order: -1; }
        .toc { background: transparent; border: none; border-left: 2px solid var(--accent); border-radius: 0; padding: 0 0 0 1rem; }
        .toc-title { display: block; }
        .toc-body { max-height: none !important; opacity: 1 !important; }
        .article { flex: 1; max-width: 680px; }
        main > *:not(.toc-wrap):not(.article) { max-width: 680px; }
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.2rem 0 3rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 3.5rem;
      }

      nav .logo {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 1.1rem;
        letter-spacing: -0.02em;
        color: var(--text);
        border: none;
      }

      nav .logo span {
        color: var(--accent);
      }

      nav ul {
        display: flex;
        gap: 2rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      nav ul li::before {
        display: none;
      }

      nav a {
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
        border: none;
      }

      nav a:hover {
        color: var(--accent);
        border: none;
      }

      footer {
        margin-top: 5rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      @media (max-width: 700px) {
        body {
          padding: 2rem 1.2rem 4rem;
          font-size: 17px;
        }
        h1 {
          font-size: 2rem;
        }
        h2 {
          font-size: 1.35rem;
        }
        nav ul {
          gap: 1.2rem;
        }
        nav {
          flex-wrap: wrap;
          gap: 1rem;
        }
        footer {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main>
      {{ if .TOC }}
      <div class="toc-wrap">
        <button class="toc-toggle" aria-expanded="true" aria-controls="toc-body">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Contents
        </button>
        <details class="toc" open>
          <summary class="toc-title">Contents</summary>
          <div class="toc-body" id="toc-body">
            <ul>
              {{ range .TOC }}
              <li>
                <a href="#{{ .ID }}">{{ .Text }}</a>
              </li>
              {{ end }}
            </ul>
          </div>
        </details>
      </div>
      {{ end }}

      <article class="article">
        <h1>{{ .Title }}</h1>
        {{ .Content }}
      </article>
    </main>

    <footer>
      <span>&copy; {{ .Year }} Kite</span>
    </footer>

    <script>
      const toggle = document.querySelector(".toc-toggle");
      const body = document.getElementById("toc-body");
      const details = document.querySelector(".toc");

      if (toggle && body) {
        toggle.addEventListener("click", () => {
          const expanded = toggle.getAttribute("aria-expanded") === "true";
          toggle.setAttribute("aria-expanded", String(!expanded));
          body.classList.toggle("collapsed", expanded);
        });
      }

      const tocLinks = document.querySelectorAll(".toc a");

      if (tocLinks.length > 0) {
        const headingIDs = Array.from(tocLinks).map((a) => decodeURIComponent(a.getAttribute("href").slice(1)));
        const headings = headingIDs.map((id) => document.getElementById(id)).filter(Boolean);

        let current = null;

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                current = entry.target.id;
              }
            });

            tocLinks.forEach((a) => {
              const id = decodeURIComponent(a.getAttribute("href").slice(1));
              a.classList.toggle("active", id === current);
            });
          },
          { rootMargin: "0px 0px -70% 0px", threshold: 0 }
        );

        headings.forEach((h) => observer.observe(h));
      }
    </script>
  </body>
</html>
