<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ .Title }}" />
    <title>{{ .Title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-okaidia.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>
    <style>
      body {
        margin: 0;
        padding: 3rem 2rem;
        background: #fffff8;
        color: #111;
        font-family: Georgia, "Libre Baskerville", serif;
        line-height: 1.75;
        font-size: 19px;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body > * {
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
      }

      h1, h2, h3 {
        text-align: left;
        font-weight: 700;
        line-height: 1.25;
        scroll-margin-top: 1rem;
      }

      h1 {
        font-size: 2.4rem;
        margin-bottom: 1rem;
      }

      h2 {
        font-size: 1.6rem;
        margin-top: 3rem;
      }

      h3 {
        font-size: 1.3rem;
        margin-top: 2rem;
      }

      p {
        margin: 1.3rem 0;
      }

      a {
        color: #0066cc;
        text-decoration: underline;
      }

      a:hover {
        color: #004499;
      }

      ul, ol {
        margin: 1.2rem 0 1.2rem 1.6rem;
      }

      li {
        margin: 0.4rem 0;
      }

      hr {
        border: none;
        border-top: 1px solid #ddd;
        margin: 3rem auto;
      }

      table {
        border-collapse: collapse;
        margin: 1.5rem 0;
        font-size: 0.95rem;
      }

      th, td {
        padding: 0.5rem 0.8rem;
        border-bottom: 1px solid #ddd;
      }

      th {
        text-align: left;
        font-weight: 700;
      }

      code {
        font-family: "SF Mono", Menlo, Monaco, monospace;
        font-size: 0.85rem;
        background: #f5f5f5;
        padding: 0.15rem 0.3rem;
        border-radius: 2px;
      }

      pre {
        background: #f5f5f5;
        padding: 1rem 1.2rem;
        overflow-x: auto;
        border-radius: 4px;
        margin: 1.5rem 0;
      }

      pre code {
        background: none;
        padding: 0;
        font-size: 0.85rem;
      }

      blockquote {
        margin: 2rem 0;
        padding: 0 0 0 1.5rem;
        border-left: 2px solid #ddd;
        font-style: italic;
        color: #555;
      }

      img {
        max-width: 100%;
        height: auto;
        margin: 2rem auto;
      }

      main { display: flex; flex-direction: column; align-items: center; }

      .toc-wrap {
        margin: 2rem 0;
        padding: 1rem;
        background: #f8f8f0;
        border-radius: 4px;
      }

      .toc-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #555;
        margin: 0 0 0.5rem;
        display: block;
        cursor: pointer;
      }

      .toc ul {
        margin: 0;
        padding-left: 1rem;
        list-style: none;
      }

      .toc li {
        padding: 0.15rem 0;
        margin: 0;
      }

      .toc li::before { display: none; }

      .toc a {
        color: #333;
        text-decoration: none;
        font-size: 0.95rem;
        display: block;
        padding: 0.15rem 0;
      }

      .toc a:hover {
        color: #0066cc;
      }

      .toc a.active {
        color: #0066cc;
        font-weight: 500;
      }

      .toc-toggle {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 0.5rem;
        width: 100%;
        text-align: left;
      }

      .toc-toggle svg { transition: transform 140ms ease; }
      .toc-toggle[aria-expanded="false"] svg { transform: rotate(-90deg); }

      .toc-body {
        overflow: hidden;
        transition: max-height 240ms ease, opacity 200ms ease;
        max-height: 500px;
        opacity: 1;
      }

      .toc-body.collapsed { max-height: 0; opacity: 0; }

      @media (max-width: 699px) {
        .toc-title { display: none; }
      }

      @media (min-width: 700px) and (max-width: 1099px) {
        .toc { display: block; background: transparent; border: none; padding: 0; }
        .toc-title { display: block; }
        .toc-body { max-height: none !important; opacity: 1 !important; }
      }

      @media (min-width: 1100px) {
        main { flex-direction: row; align-items: flex-start; max-width: 1100px; }
        .toc-wrap { position: sticky; top: 6rem; width: 200px; flex-shrink: 0; margin-right: 3rem; order: -1; background: transparent; padding: 0; }
        .toc { background: transparent; border: none; padding: 0; }
        .toc-title { display: block; }
        .toc-body { max-height: none !important; opacity: 1 !important; }
        .article { flex: 1; max-width: 680px; }
        main > *:not(.toc-wrap):not(.article) { max-width: 680px; }
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 0 2rem;
        border-bottom: 1px solid #ddd;
        margin-bottom: 2rem;
      }

      nav .logo {
        font-family: Georgia, serif;
        font-weight: 700;
        font-size: 1.2rem;
        color: #111;
        text-decoration: none;
      }

      nav ul {
        display: flex;
        gap: 1.5rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      nav a {
        color: #555;
        text-decoration: none;
        font-size: 0.9rem;
      }

      nav a:hover {
        color: #0066cc;
      }

      footer {
        margin-top: 4rem;
        padding-top: 1.5rem;
        border-top: 1px solid #ddd;
        font-size: 0.85rem;
        color: #555;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      @media (max-width: 700px) {
        body {
          padding: 1.5rem 1rem;
          font-size: 17px;
        }
        h1 {
          font-size: 2rem;
        }
        h2 {
          font-size: 1.4rem;
        }
        nav {
          flex-wrap: wrap;
          gap: 0.8rem;
        }
        footer {
          flex-direction: column;
          text-align: center;
          gap: 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="logo">Kite</a>
      <ul>
        <li><a href="/">Home</a></li>
      </ul>
    </nav>

    <main>
      {{ if .TOC }}
      <div class="toc-wrap">
        <button class="toc-toggle" aria-expanded="true" aria-controls="toc-body">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Contents
        </button>
        <details class="toc" open>
          <summary class="toc-title">Contents</summary>
          <div class="toc-body" id="toc-body">
            <ul>
              {{ range .TOC }}
              <li>
                <a href="#{{ .ID }}">{{ .Text }}</a>
              </li>
              {{ end }}
            </ul>
          </div>
        </details>
      </div>
      {{ end }}

      <article class="article">
        <h1>{{ .Title }}</h1>
        {{ .Content }}
      </article>
    </main>

    <footer>
      <span>&copy; {{ .Year }} Kite</span>
    </footer>

    <script>
      const toggle = document.querySelector(".toc-toggle");
      const body = document.getElementById("toc-body");
      const details = document.querySelector(".toc");

      if (toggle && body) {
        toggle.addEventListener("click", () => {
          const expanded = toggle.getAttribute("aria-expanded") === "true";
          toggle.setAttribute("aria-expanded", String(!expanded));
          body.classList.toggle("collapsed", expanded);
        });
      }

      const tocLinks = document.querySelectorAll(".toc a");

      if (tocLinks.length > 0) {
        const headingIDs = Array.from(tocLinks).map((a) => decodeURIComponent(a.getAttribute("href").slice(1)));
        const headings = headingIDs.map((id) => document.getElementById(id)).filter(Boolean);

        let current = null;

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                current = entry.target.id;
              }
            });

            tocLinks.forEach((a) => {
              const id = decodeURIComponent(a.getAttribute("href").slice(1));
              a.classList.toggle("active", id === current);
            });
          },
          { rootMargin: "0px 0px -70% 0px", threshold: 0 }
        );

        headings.forEach((h) => observer.observe(h));
      }
    </script>
  </body>
</html>
