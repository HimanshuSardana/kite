<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ .Title }}" />
    <title>{{ .Title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zodiak:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Cabinet+Grotesk:wght@400;500;700;800&family=Commit+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-okaidia.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>
    <style>
      :root {
        --rp-base: #191724;
        --rp-surface: #1f1d2e;
        --rp-overlay: #26233a;
        --rp-muted: #6e6a86;
        --rp-subtle: #908caa;
        --rp-text: #e0def4;
        --rp-love: #eb6f92;
        --rp-gold: #f6c177;
        --rp-rose: #ebbcba;
        --rp-pine: #31748f;
        --rp-foam: #9ccfd8;
        --rp-iris: #c4a7e7;
        --rp-highlight-med: #403d52;
        --bg: var(--rp-base);
        --surface: var(--rp-surface);
        --border: var(--rp-highlight-med);
        --text: var(--rp-text);
        --text-dim: var(--rp-subtle);
        --text-muted: var(--rp-muted);
        --accent: var(--rp-iris);
        --accent-2: var(--rp-foam);
        --accent-dim: rgba(196, 167, 231, 0.1);
        --serif: "Zodiak", "Playfair Display", Georgia, serif;
        --sans: "Cabinet Grotesk", "Outfit", system-ui, sans-serif;
        --mono: "Commit Mono", "JetBrains Mono", ui-monospace, monospace;
        --radius: 6px;
        --max-w: 740px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        padding: 4rem 2rem 6rem;
        background-color: var(--rp-base);
        background-image:
          radial-gradient(
            ellipse 80% 50% at 50% -10%,
            rgba(196, 167, 231, 0.08) 0%,
            transparent 60%
          );
        color: var(--rp-text);
        font-family: var(--serif);
        line-height: 1.8;
        font-size: 19px;
        -webkit-font-smoothing: antialiased;
      }

      body > * {
        max-width: var(--max-w);
        margin-left: auto;
        margin-right: auto;
      }

      h1, h2, h3, h4 {
        font-family: var(--sans);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.02em;
        scroll-margin-top: 1.5rem;
      }

      h1 {
        font-size: clamp(2.2rem, 5vw, 3rem);
        font-weight: 800;
        margin-bottom: 1.2rem;
        background: linear-gradient(
          135deg,
          var(--rp-text) 30%,
          var(--rp-iris) 65%,
          var(--rp-foam) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      h2 {
        font-size: 1.5rem;
        margin-top: 3.5rem;
        padding-top: 2rem;
        border-top: 1px solid var(--rp-highlight-med);
        color: var(--rp-pine);
      }

      h3 {
        font-size: 1.15rem;
        font-weight: 600;
        margin-top: 2.2rem;
        color: var(--rp-gold);
      }

      p {
        margin: 1.4rem 0;
        color: var(--rp-text);
      }

      a {
        color: var(--rp-foam);
        text-decoration: none;
        border-bottom: 1px solid var(--rp-highlight-med);
      }

      a:hover {
        color: var(--rp-iris);
        border-bottom-color: var(--rp-iris);
      }

      ul, ol {
        margin: 1.4rem 0;
        padding-left: 0;
        list-style: none;
      }

      ul li, ol li {
        position: relative;
        padding-left: 1.5rem;
        margin: 0.55rem 0;
        color: var(--rp-text);
      }

      ul li::before {
        content: "–";
        position: absolute;
        left: 0;
        color: var(--rp-gold);
        font-family: var(--mono);
      }

      code {
        font-family: var(--mono);
        font-size: 0.83rem;
        background: var(--rp-overlay);
        color: var(--rp-love);
        padding: 0.18rem 0.4rem;
        border-radius: var(--radius);
        border: 1px solid var(--rp-highlight-med);
        word-break: break-word;
      }

      pre {
        background: var(--rp-surface);
        border: 1px solid var(--rp-highlight-med);
        border-left: 2px solid var(--rp-iris);
        padding: 1.4rem 1.6rem;
        overflow-x: auto;
        border-radius: var(--radius);
        margin: 2rem 0;
      }

      pre code {
        background: none;
        border: none;
        padding: 0;
        color: var(--rp-text);
        font-size: 0.87rem;
        line-height: 1.65;
      }

      blockquote {
        margin: 2.5rem 0;
        padding: 1.5rem 1.8rem;
        background: var(--rp-surface);
        border-left: 2px solid var(--rp-iris);
        border-radius: 0 var(--radius) var(--radius) 0;
      }

      blockquote p {
        margin: 0;
        font-style: italic;
        font-size: 1.1rem;
        color: var(--rp-rose);
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: var(--radius);
        border: 1px solid var(--rp-highlight-med);
        margin: 2rem auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 2rem 0;
        font-size: 0.9rem;
        font-family: var(--mono);
        background: var(--rp-surface);
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--rp-highlight-med);
      }

      thead {
        background: var(--rp-overlay);
      }

      th {
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--rp-foam);
        border-bottom: 1px solid var(--rp-highlight-med);
        font-weight: 500;
      }

      td {
        padding: 0.65rem 1rem;
        color: var(--rp-subtle);
      }

      hr {
        border: none;
        margin: 3.5rem auto;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--rp-highlight-med) 20%, var(--rp-highlight-med) 80%, transparent);
      }

      .toc-wrap {
        margin: 2.5rem 0;
      }

      .toc {
        background: var(--rp-surface);
        border: 1px solid var(--rp-highlight-med);
        border-left: 2px solid var(--rp-iris);
        border-radius: 3px;
        padding: 1rem 1.2rem;
      }

      .toc-title {
        font-size: 0.8rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--rp-iris);
        margin: 0 0 0.8rem;
        display: block;
      }

      .toc ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .toc li {
        padding: 0.2rem 0;
        margin: 0;
      }

      .toc li::before {
        display: none;
      }

      .toc a {
        font-size: 0.85rem;
        color: var(--rp-subtle);
        text-decoration: none;
        border: none;
      }

      .toc a:hover {
        color: var(--accent);
        border: none;
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.2rem 0 3rem;
        border-bottom: 1px solid var(--rp-highlight-med);
        margin-bottom: 3.5rem;
      }

      nav .logo {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 1.1rem;
        letter-spacing: -0.02em;
        color: var(--rp-text);
        border: none;
      }

      nav .logo span {
        color: var(--rp-iris);
      }

      nav ul {
        display: flex;
        gap: 2rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      nav ul li::before {
        display: none;
      }

      nav a {
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--rp-muted);
        border: none;
      }

      nav a:hover {
        color: var(--rp-foam);
      }

      footer {
        margin-top: 5rem;
        padding-top: 2rem;
        border-top: 1px solid var(--rp-highlight-med);
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.05em;
        color: var(--rp-muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      @media (max-width: 700px) {
        body {
          padding: 2rem 1.2rem 4rem;
          font-size: 17px;
        }
        nav {
          flex-wrap: wrap;
          gap: 1rem;
        }
        footer {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="logo">Kite<span>.</span></a>
      <ul>
        <li><a href="/">Home</a></li>
      </ul>
    </nav>

    <main>
      <header class="article-header">
        <h1 class="article-h1">{{ .Title }}</h1>
      </header>

      {{ if .TOC }}
      <div class="toc-wrap">
        <details class="toc" open>
          <summary class="toc-title">Contents</summary>
          <ul>
            {{ range .TOC }}
            <li>
              <a href="#{{ .ID }}">{{ .Text }}</a>
            </li>
            {{ end }}
          </ul>
        </details>
      </div>
      {{ end }}

      <article class="prose">{{ .Content }}</article>
    </main>

    <footer>
      <span>&copy; {{ .Year }} Kite</span>
    </footer>
  </body>
</html>
