<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .SiteTitle }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Familjen+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg0: #2d3130;
        --bg1: #343f3e;
        --bg2: #3a4845;
        --bg3: #445055;
        --bg4: #4c5a5a;
        --fg: #d3c6aa;
        --fg-dim: #9da9a0;
        --fg-muted: #5a6f68;
        --red: #e67e80;
        --orange: #e69875;
        --yellow: #dbbc7f;
        --green: #a7c080;
        --aqua: #83c092;
        --blue: #7fbbb3;
        --purple: #d699b6;
        --accent: var(--green);
        --accent-2: var(--aqua);
        --accent-dim: rgba(167, 192, 128, 0.1);
        --accent-glow: rgba(167, 192, 128, 0.06);
        --border: #404d49;
        --border-soft: rgba(167, 192, 128, 0.08);
        --serif: "Crimson Pro", Georgia, serif;
        --sans: "Familjen Grotesk", system-ui, sans-serif;
        --mono: "JetBrains Mono", ui-monospace, monospace;
        --radius: 4px;
        --max-w: 720px;
        --transition: 160ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        padding: 3.5rem 2rem 6rem;
        background-color: var(--bg1);
        background-image:
          radial-gradient(
            ellipse 90% 40% at 50% -10%,
            rgba(83, 192, 146, 0.04) 0%,
            transparent 65%
          ),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23a7c080' fill-opacity='0.018'%3E%3Ccircle cx='1' cy='1' r='1'/%3E%3C/g%3E%3C/svg%3E");
        color: var(--fg);
        font-family: var(--serif);
        line-height: 1.82;
        font-size: 19px;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body > * {
        max-width: var(--max-w);
        margin-left: auto;
        margin-right: auto;
      }

      h1, h2, h3, h4 {
        font-family: var(--sans);
        line-height: 1.18;
        letter-spacing: -0.02em;
        scroll-margin-top: 1.5rem;
      }

      a {
        color: var(--aqua);
        text-decoration-line: underline;
        text-decoration-color: rgba(131, 192, 146, 0.35);
        text-underline-offset: 3px;
        text-decoration-thickness: 1px;
      }

      a:hover {
        color: var(--green);
        text-decoration-color: var(--green);
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 0 3rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 3.5rem;
      }

      nav .logo {
        font-family: var(--sans);
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: -0.02em;
        color: var(--fg);
        text-decoration: none;
      }

      nav .logo span {
        color: var(--green);
      }

      nav ul {
        display: flex;
        gap: 2rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      nav ul li::before {
        display: none;
      }

      nav a {
        font-family: var(--mono);
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--fg-muted);
        text-decoration: none;
      }

      nav a:hover {
        color: var(--aqua);
      }

      .hero {
        padding: 3rem 0 4rem;
      }

      .hero h1 {
        font-size: clamp(2.5rem, 6vw, 3.5rem);
        font-weight: 700;
        margin-bottom: 1rem;
        color: var(--fg);
      }

      .author-block {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        margin-bottom: 2rem;
      }

      .author-name {
        font-family: var(--sans);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--fg);
      }

      .author-meta {
        font-family: var(--mono);
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--fg-muted);
      }

      .author-bio {
        font-size: 1rem;
        color: var(--fg-dim);
        line-height: 1.7;
        max-width: 50ch;
      }

      .section-title {
        font-family: var(--mono);
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--fg-muted);
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 2rem;
      }

      .post-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .post-list li {
        margin: 0;
        padding: 0;
      }

      .post-item {
        display: block;
        text-decoration: none;
        padding: 1.2rem 0;
        border-bottom: 1px solid var(--border);
        transition: background 130ms ease;
      }

      .post-item:last-child {
        border-bottom: none;
      }

      .post-item:hover {
        background: var(--bg2);
      }

      .post-item:hover .post-title {
        color: var(--green);
      }

      .post-title {
        font-family: var(--sans);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--fg);
        line-height: 1.4;
        margin-bottom: 0.35rem;
        transition: color 130ms ease;
      }

      .post-meta {
        font-family: var(--mono);
        font-size: 0.7rem;
        letter-spacing: 0.04em;
        color: var(--fg-muted);
      }

      .post-tags {
        display: flex;
        gap: 0.4rem;
        margin-top: 0.5rem;
      }

      .tag {
        font-family: var(--mono);
        font-size: 0.6rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.15rem 0.5rem;
        border: 1px solid var(--border);
        border-radius: 2px;
        color: var(--fg-muted);
      }

      footer {
        margin-top: 5rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 0.7rem;
        letter-spacing: 0.04em;
        color: var(--fg-muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      @media (max-width: 700px) {
        body {
          padding: 2rem 1.3rem 4rem;
          font-size: 17px;
        }
        nav {
          flex-wrap: wrap;
          gap: 0.8rem;
        }
        footer {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="logo">Kite<span>.</span></a>
      <ul>
        <li><a href="/">Home</a></li>
      </ul>
    </nav>

    <main>
      <section class="hero">
        <h1>{{ .SiteTitle }}</h1>
        <div class="author-block">
          <span class="author-name">{{ .AuthorName }}</span>
          <span class="author-meta">{{ .AuthorRole }}</span>
        </div>
        <p class="author-bio">{{ .AuthorBio }}</p>
      </section>

      <section class="posts">
        <h2 class="section-title">Latest Posts</h2>
        <ul class="post-list">
          {{ range .Posts }}
          <li>
            <a href="/{{ .Slug }}/" class="post-item">
              <span class="post-title">{{ .Title }}</span>
              <div class="post-meta">
                <time>{{ .Date }}</time>
              </div>
              {{ if .Tags }}
              <div class="post-tags">
                {{ range .Tags }}
                <span class="tag">{{ . }}</span>
                {{ end }}
              </div>
              {{ end }}
            </a>
          </li>
          {{ end }}
        </ul>
      </section>
    </main>

    <footer>
      <span>&copy; {{ .Year }} {{ .AuthorName }}</span>
    </footer>
  </body>
</html>
